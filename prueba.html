<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administrador - Carga de Productos</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .campo { margin-bottom: 15px; display: flex; flex-direction: column; }
        #campos-dinamicos { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 10px; }
        button { background: #0070f3; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #0051a2; }
        img#preview { max-width: 100px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2>Agregar Nuevo Producto</h2>

    <div class="campo">
        <label>Tipo de Producto:</label>
        <select id="tipo-producto">
            <option value="">-- Seleccionar --</option>
            <option value="T_Shirt">Remera</option>
            <option value="Vinyls">Vinilo</option>
            <option value="Glases">Ante ojos</option>
            <option value="Bandanna">Bandanna</option>
        </select>
    </div>

    <div class="campo">
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Ej: Remera Oficial">
    </div>

    <div class="campo">
        <label>Precio:</label>
        <input type="number" id="precio" step="0.01">
    </div>

    <div class="campo">
        <label>Stock:</label>
        <input type="number" id="stock">
    </div>

    <div class="campo">
        <label>Imagen:</label>
        <input type="file" id="foto-input" accept="image/*">
        <img id="preview" src="" alt="Previsualización">
    </div>

    <div id="campos-dinamicos">
        <p style="color: #666;">Seleccioná un tipo para ver campos específicos.</p>
    </div>

    <button id="btn-guardar" style="margin-top: 20px; width: 100%;">Guardar Producto</button>

    <script type="importmap">
    {
        "imports": {
            "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    }
}
</script>

    <script type="module">
            // Importamos lo necesario (Ajustá las rutas según tu carpeta src)
        import { PRODUCT_CONFIG } from './src/utils/ProductFactory.js';
        import { ProductRepository } from './src/repositories/ProductRepository.js';

        const repo = new ProductRepository();
        const selectTipo = document.getElementById('tipo-producto');
        const contenedorCampos = document.getElementById('campos-dinamicos');

        // Esta es la pieza que falta: escucha cuando cambias el select
        selectTipo.addEventListener('change', (e) => {
            const tipo = e.target.value;
            const config = PRODUCT_CONFIG[tipo];

            // Limpiamos el contenedor
            contenedorCampos.innerHTML = '';

            if (config) {
                // Recorremos los campos que definiste en tu ProductFactory.js
                config.fields.forEach(campo => {
                    const div = document.createElement('div');
                    div.style.marginBottom = "10px";
                    
                    // IMPORTANTE: el id debe empezar con 'extra-' para que 
                    // coincida con lo que busca tu función ejecutarGuardado
                    div.innerHTML = `
                        <label style="display:block;">${campo.label}:</label>
                        <input type="${campo.type}" id="extra-${campo.id}" placeholder="Ingrese ${campo.label.toLowerCase()}">
                    `;
                    contenedorCampos.appendChild(div);
                });
            }
        });

        async function ejecutarGuardado() {
            // 1. Capturar elementos básicos
            const tipo = document.getElementById('tipo-producto').value;
            const fileInput = document.getElementById('foto-input');
            
            if (!tipo) return alert("Por favor, seleccioná un tipo de producto.");

            try {
                // 2. Subir la imagen primero (si el usuario seleccionó una)
                let urlImagen = "";
                if (fileInput.files[0]) {
                    // Este método lo tenés que tener en tu ProductRepository
                    urlImagen = await repo.uploadImage(fileInput.files[0]);
                }

                // 3. Obtener la configuración y el Builder desde tu ProductFactory
                const config = PRODUCT_CONFIG[tipo];
                const builder = config.builder();

                // 4. Cargar datos comunes (lo que está en todas las clases)
                builder.setName(document.getElementById('nombre').value)
                    .setPrice(parseFloat(document.getElementById('precio').value))
                    .setStock(parseInt(document.getElementById('stock').value))
                    .setImagenUrl(urlImagen); // Asegurate que tu ProductBuilder tenga este setter

                // 5. Cargar datos específicos dinámicamente
                // Recorremos los campos que definiste en tu PRODUCT_CONFIG
                config.fields.forEach(campo => {
                    const valorInput = document.getElementById(`extra-${campo.id}`).value;
                    if (valorInput) {
                        // Llamamos al setter dinámico (ej: setSize, setArtist)
                        builder[campo.setter](valorInput);
                    }
                });

                // 6. Construir el objeto final (T_Shirt, Vinyls, etc.)
                const nuevoProducto = builder.build();

                // 7. Guardar en Supabase usando tu método saveProduct
                const resultado = await repo.saveProduct(nuevoProducto);

                if (resultado) {
                    alert(`¡Éxito! Producto guardado con ID: ${resultado.id}`);
                    // Limpiar formulario o redireccionar
                }

            } catch (error) {
                console.error("Error en el proceso:", error);
                alert("Hubo un error al intentar guardar el producto.");
            }
        }

        // Conectar la función al botón del HTML
        document.getElementById('btn-guardar').addEventListener('click', ejecutarGuardado);
    </script>
</body>
</html>
